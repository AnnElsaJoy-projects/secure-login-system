<!DOCTYPE html>

<html>


<head>

<title>
Login
</title>


<link rel="stylesheet"
href="{{url_for('static',filename='style.css')}}">


</head>



<body>



<div class="container">


<div class="logo">

🔑

</div>



<h1>

Welcome Back

</h1>




{% with messages = get_flashed_messages() %}

{% if messages %}

{% for message in messages %}

<div class="alert">

{{message}}

</div>

{% endfor %}

{% endif %}

{% endwith %}







<form method="POST">


<input

type="email"

name="email"

placeholder="Email Address"

required>




<input

type="password"

name="password"

placeholder="Password"

required>




<button>

Login

</button>


</form>




<p>

New user?

<a href="/register">

Create Account

</a>

</p>



</div>


</body>


</html>
